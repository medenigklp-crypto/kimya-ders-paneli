<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medeni Gökalp Kimya Paneli</title>
    <link rel="icon" type="image/png" href="logo .png">
    <link rel="apple-touch-icon" href="logo .png">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col overflow-x-hidden">

    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50 shadow-md flex justify-between items-center w-full">
        <div class="flex items-center space-x-3">
            <img src="logo .png" alt="Medeni Gökalp Logo" class="h-8 w-auto object-contain rounded">
            <h1 class="text-md font-bold tracking-wide bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Medeni Gökalp Kimya Paneli <span class="text-xs font-semibold text-slate-400">v2.5</span>
            </h1>
        </div>
        <div id="save-status" class="text-[11px] text-slate-400 bg-slate-900 px-2.5 py-1 rounded-full border border-slate-700 shrink-0">
            <i class="fa-solid fa-cloud text-emerald-500 mr-1"></i> Veri Tabanı Aktif
        </div>
    </header>

    <main class="flex-1 p-3 max-w-6xl w-full mx-auto pb-24 box-border overflow-x-hidden">
        
        <section id="tab-dersler" class="tab-content space-y-4">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                <h2 class="text-base font-bold mb-1 text-blue-400 flex items-center">
                    <i class="fa-solid fa-graduation-cap mr-2"></i> Müfredat & Ders Yönetimi
                </h2>
                <div id="ayt-topics-container" class="space-y-2 mt-3"></div>
            </div>
        </section>

        <section id="tab-3d" class="tab-content space-y-4 hidden">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                <div id="canvas-3d" class="w-full rounded-lg"></div>
                <div class="grid grid-cols-3 gap-1.5 mt-3">
                    <button onclick="change3DModel('beherglas')" class="bg-teal-950 text-[10px] py-2 rounded border border-teal-800 font-semibold">Beherglas</button>
                    <button onclick="change3DModel('erlenmayer')" class="bg-teal-950 text-[10px] py-2 rounded border border-teal-800 font-semibold">Erlenmayer</button>
                    <button onclick="change3DModel('cambalon')" class="bg-teal-950 text-[10px] py-2 rounded border border-teal-800 font-semibold">Cam Balon</button>
                </div>
            </div>
        </section>

        <section id="tab-elementler" class="tab-content space-y-4 hidden">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                <h2 class="text-base font-bold text-teal-400 flex items-center mb-2">
                    <i class="fa-solid fa-table-cells mr-2"></i> 118 Element Müfredat Matrisi
                </h2>
                <div class="grid grid-cols-4 sm:grid-cols-6 gap-2 max-h-[500px] overflow-y-auto p-1" id="periodic-matrix-container">
                    </div>
            </div>
        </section>

        <section id="tab-guvenlik" class="tab-content space-y-4 hidden">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                <h2 class="text-base font-bold mb-3 text-amber-400 flex items-center"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Kimyasal Tehlike İşaretleri</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="piktogram-container"></div>
            </div>
        </section>

    </main>

    <nav class="bg-slate-800 border-t border-slate-700 fixed bottom-0 left-0 right-0 p-1 flex justify-between items-center shadow-2xl z-50 w-full">
        <button onclick="switchTab('dersler')" id="btn-dersler" class="flex-1 flex flex-col items-center justify-center py-1.5 rounded-lg text-slate-400 active-tab min-w-0">
            <i class="fa-solid fa-list-check text-xs mb-0.5"></i><span class="text-[9px] truncate">Ders</span>
        </button>
        <button onclick="switchTab('3d')" id="btn-3d" class="flex-1 flex flex-col items-center justify-center py-1.5 rounded-lg text-slate-400 min-w-0">
            <i class="fa-solid fa-cube text-xs mb-0.5"></i><span class="text-[9px] truncate">3D Stüdyo</span>
        </button>
        <button onclick="switchTab('elementler')" id="btn-elementler" class="flex-1 flex flex-col items-center justify-center py-1.5 rounded-lg text-slate-400 min-w-0">
            <i class="fa-solid fa-table-cells text-xs mb-0.5"></i><span class="text-[9px] truncate">118 Element</span>
        </button>
        <button onclick="switchTab('guvenlik')" id="btn-guvenlik" class="flex-1 flex flex-col items-center justify-center py-1.5 rounded-lg text-slate-400 min-w-0">
            <i class="fa-solid fa-triangle-exclamation text-xs mb-0.5"></i><span class="text-[9px] truncate">Güvenlik</span>
        </button>
    </nav>

    <script>
        var activeTabId = 'dersler';
        function switchTab(tabId) {
            activeTabId = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById(`btn-${tabId}`).classList.add('active-tab');
        }

        // 🎯 DISARIDAN JSON VERİ TABANINI OKUYAN AKILLI MOTOR
        async function loadElementsData() {
            try {
                const response = await fetch('elements.json');
                const elements = await response.json();
                const container = document.getElementById('periodic-matrix-container');
                container.innerHTML = '';
                
                elements.forEach(el => {
                    container.innerHTML += `
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg flex flex-col items-center justify-center text-center shadow">
                            <span class="text-[9px] text-slate-500 font-bold self-start">${el.n}</span>
                            <span class="text-sm font-black text-teal-400 mt-[-4px]">${el.s}</span>
                            <span class="text-[10px] font-medium text-slate-200 truncate w-full">${el.name}</span>
                            <span class="text-[8px] text-slate-500 font-semibold mt-0.5">${el.m}</span>
                        </div>`;
                });
            } catch (error) {
                console.error("Element veri tabanı yüklenemedi:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadElementsData();
        });
    </script>
</body>
</html>
